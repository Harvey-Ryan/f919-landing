<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fleet 919 | Star Citizen Org</title>
  <meta name="description" content="Fleet 919 — a Star Citizen org for pilots who want to experience everything the verse has to offer, without the Mil-Sim nonsense." />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Fleet 919 | Star Citizen Org" />
  <meta property="og:description" content="Fleet 919 — a Star Citizen org for pilots who want to experience everything the verse has to offer, without the Mil-Sim nonsense." />
  <meta property="og:url"         content="https://f919.org" />

  <!-- Twitter / X card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Fleet 919 | Star Citizen Org" />
  <meta name="twitter:description" content="Fleet 919 — a Star Citizen org for pilots who want to experience everything the verse has to offer, without the Mil-Sim nonsense." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="assets/images/919 Logos/919LogoBasicRSI.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="stars" aria-hidden="true"></div>

  <main class="landing">

    <header class="landing__header">
      <img class="landing__logo" src="assets/images/919 Logos/919LogoBasicRSI.png" alt="Fleet 919" />
    </header>

    <div class="landing__tiles">

      <a class="tile" href="https://join.f919.org">
        <div class="tile__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C9.5 5 8 8.5 8 12C8 14.8 9.2 17.3 11 19L9.5 20.5C9 21 9 21.8 9.5 22.2L11 22.9C11.6 23.2 12.4 23.2 13 22.9L14.5 22.2C15 21.8 15 21 14.5 20.5L13 19C14.8 17.3 16 14.8 16 12C16 8.5 14.5 5 12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="2" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </div>
        <h2 class="tile__heading">Thinking about Joining?</h2>
        <p class="tile__body">Learn what we're about and find your place in the verse.</p>
        <span class="tile__cta">Explore &rarr;</span>
      </a>

      <a class="tile" href="https://asop.f919.org">
        <div class="tile__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="3" width="20" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M6 8.5L9.5 12L6 15.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 15.5H17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <h2 class="tile__heading">Member Login</h2>
        <p class="tile__body">Access the ASOP Terminal, fleet management, events, and more.</p>
        <span class="tile__cta">Enter &rarr;</span>
      </a>

    </div>

  </main>

  <script src="js/main.js"></script>
</body>
</html>
